<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>

Preview Question Paper

</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a
class="navbar-brand"
href="index.html">

AI Question Paper Generator

</a>

</div>

</nav>

<div class="container mt-5">

<div class="card shadow">

<div class="card-body" id="paper">

<h2 class="text-center" id="schoolName">

School Name

</h2>

<h4 class="text-center" id="examName">

Examination

</h4>

<hr>

<div class="row">

<div class="col-md-4">

<b>Class :</b>

<span id="className"></span>

</div>

<div class="col-md-4 text-center">

<b>Subject :</b>

<span id="subject"></span>

</div>

<div class="col-md-4 text-end">

<b>Max Marks :</b>

<span id="maxMarks"></span>

</div>

</div>

<div class="row mt-2">

<div class="col-md-6">

<b>Time :</b>

<span id="duration"></span>

</div>

</div>

<hr>

<h5>

General Instructions

</h5>

<ol>

<li>All questions are compulsory.</li>

<li>Read each question carefully.</li>

<li>Figures in the margin indicate marks.</li>

<li>Maintain neat and clean handwriting.</li>

</ol>

<hr>

<div id="questions">

</div>

</div>

</div>

<div class="text-center mt-4 mb-5">

<button
class="btn btn-primary btn-lg"
onclick="window.print()">

🖨 Print

</button>

<button
class="btn btn-danger btn-lg ms-3"
onclick="downloadPDF()">

📥 Download PDF

</button>

</div>

</div>

<script>

const paper =
JSON.parse(localStorage.getItem("generatedPaper")) || [];

document.getElementById("schoolName").innerHTML =
localStorage.getItem("schoolName") || "School Name";

document.getElementById("examName").innerHTML =
localStorage.getItem("examName") || "Examination";

document.getElementById("className").innerHTML =
localStorage.getItem("className") || "";

document.getElementById("subject").innerHTML =
localStorage.getItem("subject") || "";

document.getElementById("maxMarks").innerHTML =
localStorage.getItem("maxMarks") || "";

document.getElementById("duration").innerHTML =
localStorage.getItem("duration") || "";

let html = "";

paper.forEach((q,index)=>{

html += `

<p>

<b>

Q${index+1}.

</b>

${q.question}

<span style="float:right;">

(${q.marks} Marks)

</span>

</p>

`;

});

document.getElementById("questions").innerHTML = html;

function downloadPDF(){

const element = document.getElementById("paper");

html2pdf()

.from(element)

.save("Question_Paper.pdf");

}

</script>

</body>

</html>
