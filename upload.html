<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>

Upload Question Bank

</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
rel="stylesheet">

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a
class="navbar-brand"
href="index.html">

AI Question Paper Generator

</a>

</div>

</nav>

<!-- Upload Form -->

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>

Question Paper Details

</h3>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

School Name

</label>

<input
type="text"
id="schoolName"
class="form-control"
placeholder="PM SHRI Kendriya Vidyalaya Dongargarh">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Examination

</label>

<input
type="text"
id="examName"
class="form-control"
placeholder="Half Yearly Examination">

</div>

</div>

<div class="row">

<div class="col-md-4 mb-3">

<label>

Class

</label>

<select
id="className"
class="form-select">
<option value="">Select Class</option>

<option>I</option>
<option>II</option>
<option>III</option>
<option>IV</option>
<option>V</option>
<option>VI</option>
<option>VII</option>
<option>VIII</option>
<option>IX</option>
<option>X</option>
<option>XI</option>
<option>XII</option>

</select>

</div>

<div class="col-md-4 mb-3">

<label>

Subject

</label>

<input
type="text"
id="subject"
class="form-control"
placeholder="Computer Science">

</div>

<div class="col-md-4 mb-3">

<label>

Maximum Marks

</label>

<input
type="number"
id="maxMarks"
class="form-control"
value="70">

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>

Duration

</label>

<input
type="text"
id="duration"
class="form-control"
value="3 Hours">

</div>

<div class="col-md-6 mb-3">

<label>

Upload DOCX Question Bank

</label>

<input
type="file"
id="questionBank"
class="form-control"
accept=".docx">

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>

School Logo (Optional)

</label>

<input
type="file"
id="logo"
class="form-control"
accept="image/*">

</div>

</div>

<hr>

<div class="text-center">

<button
class="btn btn-success btn-lg"
onclick="extractQuestions()">

<i class="bi bi-upload"></i>

Extract Questions

</button>

<button
class="btn btn-primary btn-lg ms-3"
onclick="saveDetails()">

Continue →

</button>

</div>

</div>

</div>

</div>

<!-- Status -->

<div
class="container mt-4">

<div
id="status"
class="alert alert-info">

No Question Bank Uploaded.

</div>

</div>

<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<script src="script.js"></script>
  <script>

function saveDetails(){

localStorage.setItem(
"schoolName",
document.getElementById("schoolName").value
);

localStorage.setItem(
"examName",
document.getElementById("examName").value
);

localStorage.setItem(
"className",
document.getElementById("className").value
);

localStorage.setItem(
"subject",
document.getElementById("subject").value
);

localStorage.setItem(
"maxMarks",
document.getElementById("maxMarks").value
);

localStorage.setItem(
"duration",
document.getElementById("duration").value
);

window.location.href = "blueprint.html";

}

</script>

</body>

</html>
