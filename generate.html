<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generate Question Paper</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand" href="index.html">

AI Question Paper Generator

</a>

</div>

</nav>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>

Generated Question Paper

</h3>

</div>

<div class="card-body">

<div id="paperPreview">

</div>

<div class="text-center mt-4">

<button
class="btn btn-primary btn-lg"
onclick="savePaper()">

Save & Preview

</button>

<a
href="preview.html"
class="btn btn-success btn-lg ms-3">

Next →

</a>

</div>

</div>

</div>

</div>

<script>

const questionBank =
JSON.parse(localStorage.getItem("questionBank")) || [];

const blueprint =
JSON.parse(localStorage.getItem("blueprint")) || [];

let generatedPaper=[];

function randomQuestions(chapter,marks,count){

let list=
questionBank.filter(q=>

q.chapter===chapter &&

q.marks===marks

);

list.sort(()=>Math.random()-0.5);

return list.slice(0,count);

}

blueprint.forEach(item=>{

generatedPaper.push(

...randomQuestions(item.chapter,1,item.one)

);

generatedPaper.push(

...randomQuestions(item.chapter,2,item.two)

);

generatedPaper.push(

...randomQuestions(item.chapter,3,item.three)

);

generatedPaper.push(

...randomQuestions(item.chapter,4,item.four)

);

generatedPaper.push(

...randomQuestions(item.chapter,5,item.five)

);

});

let html="";

generatedPaper.forEach((q,index)=>{

html += `

<div class="card mb-3">

<div class="card-body">

<h5>

Q${index+1}. ${q.question}

</h5>

<p>

<b>Chapter :</b>

${q.chapter}

</p>

<p>

<b>Marks :</b>

${q.marks}

</p>

</div>

</div>

`;

});

document.getElementById("paperPreview").innerHTML=html;

function savePaper(){

localStorage.setItem(

"generatedPaper",

JSON.stringify(generatedPaper)

);

alert("Question Paper Generated Successfully.");

}

</script>

</body>

</html>
